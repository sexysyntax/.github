title: "[Q&A]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this category for questions. Include what you tried, what happened, and what answer would unblock you.
  - type: input
    id: question
    attributes:
      label: Question
      description: What do you need help with?
      placeholder: Example: How do I run the site locally?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What you tried
      description: Share commands, links, screenshots, or steps already attempted.
      placeholder: Example: I ran npm run serve and opened http://localhost:4173.
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What did you expect to happen?
      placeholder: Example: I expected the homepage to load.
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead?
      placeholder: Add errors, logs, screenshots, or links.
    validations:
      required: false
