title: "[Idea]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this category for new ideas. Strong ideas explain the problem, the user benefit, and the smallest useful version.
  - type: input
    id: idea
    attributes:
      label: Idea
      description: What do you want to add or improve?
      placeholder: Example: Add a status endpoint example to the docs.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve?
      placeholder: Explain why this would help users or maintainers.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested solution
      description: How could the team build it?
      placeholder: Describe the smallest useful implementation.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Website
        - Documentation
        - Automation
        - Security
        - Community
        - Other
    validations:
      required: true
